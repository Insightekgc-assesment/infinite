<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Icons - Interviews</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/assets/stylesheet/style.css" />
    <link rel="stylesheet" href="/assets/stylesheet/master.css" />
    <link rel="stylesheet" href="/assets/stylesheet/navbar.css" />
    <link rel="stylesheet" href="/assets/stylesheet/footer.css" />

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body>
    <div id="navbar-placeholder"></div>

    <main>
      <section class="vision-section" data-aos="fade-up" data-aos-duration="1200">
        <h1 class="vision-bg-text" data-aos="zoom-in" data-aos-duration="1800" data-aos-delay="100">
          INTERVIEWS
        </h1>

        <div class="vision-container">
          <div class="vision-wrapper">
            <div class="vision-left" data-aos="fade-up" data-aos-duration="1200" data-aos-delay="200">
              <div class="vision-line" data-aos="zoom-in" data-aos-duration="1000" data-aos-delay="250"></div>

              <div>
                <div class="vision-badge" data-aos="fade-down" data-aos-duration="1000" data-aos-delay="300">
                  <span></span>
                  MEDIA
                </div>

                <h2 data-aos="zoom-in-up" data-aos-duration="1300" data-aos-delay="400">
                  Conversations That
                  <span>Unlock Leadership</span>
                </h2>
              </div>
            </div>

            <div class="vision-card" data-aos="zoom-in" data-aos-duration="1400" data-aos-delay="350">
              <p class="vision-highlight" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="450">
                Discover how leaders think, build, and create impact—through focused interviews and deep discussions.
              </p>

              <p data-aos="fade-up" data-aos-duration="1000" data-aos-delay="600">
                Our interview series amplifies founder stories and leadership insights for communities that want practical transformation.
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />

    <script src="/assets/script/navbar.js" defer></script>
    <script src="/assets/script/footer.js" defer></script>
    <script src="/assets/script/script.js" defer></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  </body>
</html>
