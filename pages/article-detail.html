<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Icons</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../assets/stylesheet/style.css" />
    <link rel="stylesheet" href="../assets/stylesheet/master.css" />
    <link rel="stylesheet" href="../assets/stylesheet/navbar.css" />
    <link rel="stylesheet" href="../assets/stylesheet/footer.css" />
    <link rel="stylesheet" href="../assets/stylesheet/spa.css" />
    <link rel="stylesheet" href="../assets/stylesheet/article-detail-responsive.css" />

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <!-- ✅ FIX: required placeholder for dynamic navbar injection -->
    <div id="navbar-placeholder"></div>

    <header class="site-header">
      <div class="container">
        <br /><br />
        <h1 data-aos="fade-right" data-aos-delay="300">Founder Spotlight</h1>
        <p class="subtitle" data-aos="fade-up" data-aos-delay="500">
          A founder-led profile built for startup leaders, interviews, and
          leadership journeys.
        </p>
      </div>
    </header>

    <main class="container-fluid py-5">
      <section id="detailPage" class="detail-page">
        <div class="detail-hero" data-aos="fade-down">
          <span id="detailCategory" class="detail-label detail-category"></span>
          <h1 id="detailHeading" class="detail-title"></h1>
          <p id="detailArticleDetail" class="detail-article-detail"></p>
          <p id="detailSubtitle" class="detail-subtitle"></p>

          <div class="detail-meta">
            <span id="detailAuthor" class="detail-meta-item"></span>
            <span class="detail-meta-divider">•</span>
            <span id="detailDate" class="detail-meta-item"></span>
          </div>

          <div id="detailTags" class="detail-tag-list"></div>
        </div>

        <div class="detail-stage">
          <aside class="detail-media" data-aos="fade-right">
            <div class="media-frame">
              <img
                id="detailImage"
                src=""
                alt="Article detail image"
                class="detail-image"
              />
              <div class="media-sheen"></div>
              <div id="detailMediaCaption" class="media-caption"></div>
            </div>
          </aside>

          <article class="detail-content" data-aos="fade-up">
            <div class="detail-panel-inner">
              <div class="detail-intro-wrap">
                <p id="detailArticle" class="detail-intro"></p>
              </div>

              <div id="detailSections" class="detail-story"></div>
              <div id="detailQuote" class="story-quote d-none"></div>
              <div id="detailStats" class="story-stats"></div>
              <div id="detailHighlights" class="story-highlights"></div>
              <div id="detailConclusion" class="detail-conclusion"></div>


            </div>
          </article>
        </div>
      </section>

      <div
        id="detailError"
        class="alert alert-danger mt-4 d-none"
        role="alert"
      ></div>

      <div class="mt-5 mb-3 text-center">
        <button
          type="button"
          class="btn btn-primary"
          onclick="if (window.history.length > 1) { history.back(); } else { window.location.href = './article.html'; }"
        >
          <i class="bi bi-arrow-left me-2"></i>Back to articles
        </button>
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <!-- =========================================================
     AOS CSS
========================================================= -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css"/>

    <!-- =========================================================
     YOUR CUSTOM SCRIPTS
========================================================= -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="../assets/script/spa.js" defer></script>
    <script src="../assets/script/navbar.js" defer></script>
    <script src="../assets/script/footer.js" defer></script>
    <script src="../assets/script/script.js" defer></script>

    <!-- =========================================================
     BOOTSTRAP
========================================================= -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- =========================================================
     AOS LIBRARY
========================================================= -->
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>


  </body>
</html>
