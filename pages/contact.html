<!doctype html>
<html lang="en">
  <head>
    <style>
      /* =========================================================
         Contact page premium responsiveness (no JS/structure changes)
      ========================================================= */
      :root{
        --ci-bg:#f6f7fb;
        --ci-card:#ffffff;
        --ci-border:rgba(15,23,42,0.12);
        --ci-soft:rgba(15,23,42,0.08);
        --ci-ink:#0f172a;
        --ci-muted:#64748b;
        --ci-indigo:#4f46e5;
      }

      main.contact-main{
        position: relative;
        isolation: isolate;
      }
      main.contact-main::before{
        content:"";
        position:absolute;
        inset:-20px;
        background:
          radial-gradient(circle at 15% 10%, rgba(99,102,241,0.18), transparent 42%),
          radial-gradient(circle at 90% 15%, rgba(124,58,237,0.12), transparent 40%),
          radial-gradient(circle at 40% 80%, rgba(99,102,241,0.10), transparent 46%);
        z-index:-1;
        pointer-events:none;
      }

      /* Hero spacing + stacking order */
      .contact-hero{
        box-shadow: 0 25px 70px rgba(5,29,73,0.12);
        border: 1px solid rgba(5,29,73,0.06);
      }
      .contact-hero-left{
        border-radius: 0;
      }

      /* Premium magazine padding */
      .contact-hero-left{
        padding: 1.5rem;
      }
      .contact-hero-right{
        padding: 1.5rem;
      }

      @media (min-width: 768px){
        .contact-hero-left{ padding: 2.5rem; }
        .contact-hero-right{ padding: 2.5rem; }
      }

      /* Text scale */
      .contact-hero-title{ 
        font-size: 1.5rem; /* mobile: text-2xl */
      }
      @media (min-width: 768px){
        .contact-hero-title{
          font-size: 2.25rem; /* tablet: text-3xl */
        }
      }
      @media (min-width: 1025px){
        .contact-hero-title{
          font-size: 2.9rem; /* desktop: text-4xl */
        }
      }

      .contact-hero-desc{
        line-height: 1.75;
        color: rgba(148,163,184,0.95);
      }

      .contact-info-item-title{
        line-height: 1.2;
      }

      .contact-info-item-link{
        line-height: 1.6;
      }

      /* Stack order: info first */
      @media (max-width: 767.98px){
        .contact-hero{
          grid-template-columns: 1fr;
        }
        .contact-info-block{ order: 1; }
        .contact-form-block{ order: 2; }
      }

      /* Contact form controls */
      .contact-input,
      .contact-select,
      .contact-textarea{
        box-shadow:
          0 1px 0 rgba(15,23,42,0.03),
          0 10px 30px rgba(15,23,42,0.04);
        transition:
          box-shadow .25s ease,
          border-color .25s ease,
          transform .15s ease,
          background .25s ease;
      }
      .contact-input:focus,
      .contact-select:focus,
      .contact-textarea:focus{
        outline: none;
        box-shadow:
          0 1px 0 rgba(15,23,42,0.03),
          0 18px 48px rgba(79,70,229,0.18);
        border-color: rgba(99,102,241,0.55);
        background: #ffffff;
        transform: translateY(-1px);
      }
      .contact-textarea{
        min-height: 140px;
      }

      /* Button premium gradient + animation */
      .contact-submit-btn{
        background: linear-gradient(135deg, #4f46e5, #7c3aed, #4f46e5);
        background-size: 180% 180%;
        transition: transform .2s ease, box-shadow .25s ease, filter .25s ease, background-position .6s ease;
        box-shadow: 0 18px 40px rgba(79,70,229,0.18);
      }
      .contact-submit-btn:hover{
        transform: translateY(-2px) scale(1.02);
        filter: saturate(1.04) brightness(1.02);
        background-position: 100% 0%;
        box-shadow: 0 24px 55px rgba(79,70,229,0.25);
      }
      .contact-submit-btn:active{
        transform: translateY(0) scale(0.99);
      }

      /* Cards section premium */
      .contact-premium-card{
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        background: rgba(255,255,255,0.7);
        border: 1px solid rgba(15,23,42,0.10);
        box-shadow: 0 16px 40px rgba(2,6,23,0.06);
        transition: transform .35s ease, box-shadow .35s ease, border-color .35s ease;
      }
      .contact-premium-card:hover{
        transform: translateY(-6px);
        box-shadow: 0 26px 70px rgba(2,6,23,0.12);
        border-color: rgba(99,102,241,0.28);
      }

      /* Section headings */
      .contact-section-title{
        font-size: 1.25rem; /* mobile: text-xl */
        line-height: 1.3;
        letter-spacing: -0.01em;
      }
      @media (min-width: 1025px){
        .contact-section-title{
          font-size: 1.9rem; /* desktop */
        }
      }
      @media (min-width: 768px) and (max-width: 1024px){
        .contact-section-title{
          font-size: 1.6rem;
        }
      }

      /* FAQ details premium */
      details.contact-faq{
        transition: box-shadow .35s ease, border-color .35s ease;
      }
      details.contact-faq[open]{
        box-shadow: 0 22px 55px rgba(2,6,23,0.10);
        border-color: rgba(99,102,241,0.22);
      }

      details.contact-faq > summary{
        min-height: 52px; /* touch area */
      }

      details.contact-faq p{
        max-width: 65ch;
      }

      details.contact-faq > p{
        animation: contactFAQIn .28s ease both;
      }
      @keyframes contactFAQIn{
        from{ opacity:0; transform: translateY(-4px); }
        to{ opacity:1; transform: translateY(0); }
      }

      /* Global section spacing shrink */
      main.contact-main{
        padding-top: 1.75rem;
        padding-bottom: 1.75rem;
      }
      .contact-sections-space{
        row-gap: 4.5rem;
      }

      @media (max-width: 767.98px){
        .contact-sections-space{ row-gap: 3rem; }
      }
    </style>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/assets/images/favIcons.png" type="image/png">
    <link rel="apple-touch-icon" href="/assets/images/favIcons.png" type="image/png">
    <title>Infinite Icons - Contact</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/assets/stylesheet/style.css" />
    <link rel="stylesheet" href="/assets/stylesheet/master.css" />
    <link rel="stylesheet" href="/assets/stylesheet/navbar.css" />
    <link rel="stylesheet" href="/assets/stylesheet/footer.css" />

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body>
    <div id="navbar-placeholder"></div>

    <!-- Main Content Container -->
    <main class="flex-grow py-16 px-4 sm:px-6 lg:px-8 space-y-24">
      
      <!-- SECTION 1: HERO & CORE CONTACT FORM GRID -->
      <section 
        class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden grid grid-cols-1 md:grid-cols-12"
        data-aos="fade-up" 
        data-aos-duration="1000"
      >
        <!-- Left Column: Contact Information -->
        <div class="md:col-span-5 bg-slate-900 text-white p-8 md:p-12 flex flex-col justify-between relative overflow-hidden contact-info-block">

          <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-indigo-600 rounded-full blur-2xl opacity-40"></div>
          <div class="absolute -left-10 -top-10 w-32 h-32 bg-purple-600 rounded-full blur-2xl opacity-30"></div>

          <div class="relative z-10">
            <h1 class="text-3xl font-extrabold tracking-tight mb-2">Get in Touch</h1>
            <p class="text-slate-400 text-sm mb-10">Have questions about Infinite Icons? Drop us a message, and our team will get back to you within 24 hours.</p>

            <!-- Info Items -->
            <div class="space-y-6">
              <div class="flex items-start space-x-4">
                <div class="flex items-center justify-center w-10 h-10 rounded-lg bg-slate-800 text-indigo-400 text-lg shrink-0">
                  <i class="bi bi-envelope-fill"></i>
                </div>
                <div>
                  <h3 class="text-sm font-semibold text-slate-300">Email Us</h3>
                  <a href="mailto:hello@infiniteicons.com" class="text-white hover:text-indigo-400 transition-colors text-sm">hello@infiniteicons.com</a>
                </div>
              </div>

              <div class="flex items-start space-x-4">
                <div class="flex items-center justify-center w-10 h-10 rounded-lg bg-slate-800 text-indigo-400 text-lg shrink-0">
                  <i class="bi bi-telephone-fill"></i>
                </div>
                <div>
                  <h3 class="text-sm font-semibold text-slate-300">Call Us</h3>
                  <a href="tel:+1234567890" class="text-white hover:text-indigo-400 transition-colors text-sm">+1 (234) 567-890</a>
                  <p class="text-xs text-slate-500 mt-0.5">Mon-Fri, 9am - 6pm PST</p>
                </div>
              </div>

              <div class="flex items-start space-x-4">
                <div class="flex items-center justify-center w-10 h-10 rounded-lg bg-slate-800 text-indigo-400 text-lg shrink-0">
                  <i class="bi bi-geo-alt-fill"></i>
                </div>
                <div>
                  <h3 class="text-sm font-semibold text-slate-300">HQ Office</h3>
                  <p class="text-slate-400 text-sm leading-relaxed">101 Design Innovation Way,<br>Suite 404, San Francisco, CA</p>
                </div>
              </div>
            </div>
          </div>

          <!-- Social Media Icons -->
          <div class="relative z-10 mt-12 md:mt-0 pt-6 border-t border-slate-800 flex space-x-4 text-xl">
            <a href="/pages/contact.html" class="text-slate-400 hover:text-white transition-colors" aria-label="Twitter"><i class="bi bi-twitter-x"></i></a>
            <a href="/pages/contact.html" class="text-slate-400 hover:text-white transition-colors" aria-label="GitHub"><i class="bi bi-github"></i></a>
            <a href="/pages/contact.html" class="text-slate-400 hover:text-white transition-colors" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
            <a href="/pages/contact.html" class="text-slate-400 hover:text-white transition-colors" aria-label="Dribbble"><i class="bi bi-dribbble"></i></a>
          </div>
        </div>

<!-- Right Column: Contact Form -->
<div class="md:col-span-7 p-8 md:p-12">
  <form action="#" method="POST" class="space-y-6">
    
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
      <div>
        <label for="first-name" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">
          First Name
        </label>
        <input
          type="text"
          id="first-name"
          name="first-name"
          required
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:bg-white transition-all text-sm"
          placeholder="Jane"
        />
      </div>

      <div>
        <label for="last-name" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">
          Last Name
        </label>
        <input
          type="text"
          id="last-name"
          name="last-name"
          required
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:bg-white transition-all text-sm"
          placeholder="Doe"
        />
      </div>
    </div>

    <div>
      <label for="email" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">
        Email Address
      </label>
      <input
        type="email"
        id="email"
        name="email"
        required
        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:bg-white transition-all text-sm"
        placeholder="jane.doe@example.com"
      />
    </div>

    <div>
      <label for="message" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">
        Message
      </label>
      <textarea
        id="message"
        name="message"
        rows="5"
        required
        class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 focus:bg-white transition-all text-sm resize-none"
        placeholder="Tell us how we can help you..."
      ></textarea>
    </div>

    <!-- Submit Button -->
    <div class="pt-2">
      <button
        type="submit"
        class="group w-full sm:w-auto inline-flex items-center justify-center gap-2 px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold rounded-xl transition-all duration-300 shadow-lg hover:shadow-2xl hover:-translate-y-0.5"
      >
        Send Message

        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-5 h-5 transition-transform duration-300 group-hover:translate-x-1"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M13 7l5 5m0 0l-5 5m5-5H6"
          />
        </svg>
      </button>
    </div>

  </form>
</div>

      </section>

    </main>

    <div id="footer-placeholder"></div>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />

    <script src="/assets/script/navbar.js" defer></script>
    <script src="/assets/script/footer.js" defer></script>
    <script src="/assets/script/script.js" defer></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

  </body>
</html>
