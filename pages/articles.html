<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Icons - Articles</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/assets/stylesheet/style.css" />
    <link rel="stylesheet" href="/assets/stylesheet/master.css" />
    <link rel="stylesheet" href="/assets/stylesheet/navbar.css" />
    <link rel="stylesheet" href="/assets/stylesheet/footer.css" />
  </head>

  <body>
    <div id="navbar-placeholder"></div>

    <main>
     <!-- Articles Section (JS rendered) -->
      <section class="articles-page py-5" aria-label="Articles">
        <div class="container" style="max-width:1200px;">
          <div class="d-flex flex-column flex-md-row justify-content-between align-items-start mb-4 gap-3">
            <div>
              <h2 class="h4 mb-1 fw-semibold">Recent articles</h2>
              <p class="text-muted mb-0">Insights, tutorials, and stories from our team.</p>
            </div>
          </div>

          <!-- Featured -->
          <div id="featuredWrap" class="mb-5"></div>

          <!-- Filters + error -->
          <div class="d-flex flex-column gap-3 mb-4">
            <div id="filterContainer" class="articles-filters d-flex flex-wrap gap-2"></div>
            <div id="articlesError" class="articles-error" style="display:none"></div>
          </div>

          <!-- Cards grid -->
          <div id="storiesGrid" class="row g-4"></div>
        </div>
      </section>


    </main>

    <div id="footer-placeholder"></div>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css"
    />

    <script src="/assets/script/navbar.js" defer></script>
    <script src="/assets/script/footer.js" defer></script>
    <script src="/assets/script/script.js" defer></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

    <script>
      async function loadComponent(url, placeholderId) {
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          const html = await response.text();

          const placeholder = document.getElementById(placeholderId);
          if (placeholder) {
            placeholder.innerHTML = html;
            if (window.AOS) AOS.refresh();
          }
        } catch (err) {
          console.error("Error loading component:", err);
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        loadComponent("/components/navbar.html", "navbar-placeholder");
        loadComponent("/components/footer.html", "footer-placeholder");

        if (window.AOS) {
          AOS.init({
            duration: 1000,
            easing: "ease-out-cubic",
            once: true,
            mirror: false,
            offset: 120,
            delay: 0,
            throttleDelay: 99,
            debounceDelay: 50,
            disable: function () {
              return window.innerWidth < 768;
            },
          });
        }
      });

      window.addEventListener("load", () => {
        if (window.AOS) AOS.refreshHard();
      });
    </script>

    <script src="/assets/script/articles.js" defer></script>

  </body>
</html>
