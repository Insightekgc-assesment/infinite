<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Infinite Icons - Article</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link rel="stylesheet" href="/assets/stylesheet/style.css" />
<link rel="stylesheet" href="/assets/stylesheet/master.css" />
<link rel="stylesheet" href="/assets/stylesheet/navbar.css" />
<link rel="stylesheet" href="/assets/stylesheet/footer.css" />
<link rel="stylesheet" href="article-styles.css" /> <!-- Separate CSS file -->
</head>
<body>
<div id="navbar-placeholder"></div>
<main>
<section class="vision-section" style="padding-bottom: 0">
<div class="container">
<div class="article-nav" id="articleNav" aria-live="polite"></div>
<div class="article-hero" id="articleHero" aria-live="polite"></div>
</div>
</section>
<section class="article-section" style="padding-bottom: 80px">
<div class="container" style="max-width: 980px">
<div id="articleContent" class="article-content"></div>
<div id="continueWrap" style="display:none" class="continue-wrap mt-5">
<h3 style="color: var(--primary); font-weight: 900; margin: 0">Continue Reading</h3>
<div class="related-scroll" style="overflow-x:auto; padding-bottom: 8px">
<div class="row g-4 flex-nowrap" id="continueGrid" style="min-width: max-content"></div>
</div>
</div>
<div id="relatedWrap" class="related-wrap" style="display: none">
<div class="mt-5">
<h3 class="mb-3" style="color: var(--primary); font-weight: 900">Related Articles</h3>
<div class="row g-4" id="relatedGrid"></div>
</div>
</div>
<div id="articleError" class="article-error" style="display: none"></div>
</div>
</section>
</main>
<div id="footer-placeholder"></div>
<script src="/assets/script/navbar.js" defer></script>
<script src="/assets/script/footer.js" defer></script>
<script src="/assets/script/script.js" defer></script>
<script src="/assets/script/article.js" defer></script>
<script src="article.js"></script>
<script src="article-scripts.js"></script> <!-- Separate JS file -->
</body>
</html>
