<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Icons - Insights</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/assets/stylesheet/style.css" />
    <link rel="stylesheet" href="/assets/stylesheet/master.css" />
    <link rel="stylesheet" href="/assets/stylesheet/navbar.css" />
    <link rel="stylesheet" href="/assets/stylesheet/footer.css" />

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body>
    <div id="navbar-placeholder"></div>

    <main>
      <section class="vision-section" data-aos="fade-up" data-aos-duration="1200">
        <h1 class="vision-bg-text" data-aos="zoom-in" data-aos-duration="1800" data-aos-delay="100">
          INSIGHTS
        </h1>

        <div class="vision-container">
          <div class="vision-wrapper">
            <div class="vision-left" data-aos="fade-up" data-aos-duration="1200" data-aos-delay="200">
              <div class="vision-line" data-aos="zoom-in" data-aos-duration="1000" data-aos-delay="250"></div>

              <div>
                <div class="vision-badge" data-aos="fade-down" data-aos-duration="1000" data-aos-delay="300">
                  <span></span>
                  LEARN
                </div>

                <h2 data-aos="zoom-in-up" data-aos-duration="1300" data-aos-delay="400">
                  Thought Leadership
                  <span>With Real Outcomes</span>
                </h2>
              </div>
            </div>

            <div class="vision-card" data-aos="zoom-in" data-aos-duration="1400" data-aos-delay="350">
              <p class="vision-highlight" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="450">
                Explore insights on leadership visibility, innovation recognition, strategic collaboration, and global impact creation.
              </p>

              <p data-aos="fade-up" data-aos-duration="1000" data-aos-delay="600">
                Our content is designed to help founders, leaders, and ecosystem partners make better decisions and move faster.
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />

    <script src="/assets/script/navbar.js" defer></script>
    <script src="/assets/script/footer.js" defer></script>
    <script src="/assets/script/script.js" defer></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

    <script>
      async function loadComponent(url, placeholderId) {
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          const html = await response.text();
          const placeholder = document.getElementById(placeholderId);
          if (placeholder) {
            placeholder.innerHTML = html;
            if (window.AOS) AOS.refresh();
          }
        } catch (err) {
          console.error('Error loading component:', err);
        }
      }

      window.addEventListener('DOMContentLoaded', () => {
        loadComponent('/components/navbar.html', 'navbar-placeholder');
        loadComponent('/components/footer.html', 'footer-placeholder');

        if (window.AOS) {
          AOS.init({
            duration: 1000,
            easing: 'ease-out-cubic',
            once: true,
            mirror: false,
            offset: 120,
            delay: 0,
            throttleDelay: 99,
            debounceDelay: 50,
            disable: function () {
              return window.innerWidth < 768;
            },
          });
        }
      });

      window.addEventListener('load', () => {
        if (window.AOS) AOS.refreshHard();
      });
    </script>
  </body>
</html>
